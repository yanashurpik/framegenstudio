  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n/* ---------- TOKENS ---------- */\n:root{\n  --bg:        #fbfbf9;\n  --bg-2:      #f3f3ef;\n  --card:      #ffffff;\n  --ink:       #111111;\n  --ink-2:     #444444;\n  --muted:     #7a7a73;\n  --line:      rgba(17,17,17,.10);\n  --line-2:    rgba(17,17,17,.06);\n  --accent:    #d24034;        /* warm red — primary accent */\n  --accent-soft:#ffd9d3;        /* soft red tint for backgrounds */\n  --accent-deep:#6e1714;        /* deep red for text on tints */\n  --accent-blue:#1d5cff;\n  --shadow-lg: 0 30px 60px -28px rgba(17,17,17,.25);\n  --shadow-md: 0 14px 30px -18px rgba(17,17,17,.22);\n\n  --f-display: \"Bricolage Grotesque\", \"Geist\", system-ui, sans-serif;\n  --f-body:    \"Geist\", system-ui, sans-serif;\n  --f-mono:    \"JetBrains Mono\", ui-monospace, monospace;\n\n  --maxw: 1320px;\n  --pad:  clamp(20px, 4vw, 56px);\n  --radius-lg: 28px;\n  --radius-md: 18px;\n  --radius-sm: 12px;\n}\n\n/* ---------- RESET ---------- */\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{background:var(--bg);color:var(--ink);font-family:var(--f-body);font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\nhtml{scroll-behavior:smooth}\nbody{overflow-x:hidden;line-height:1.5;font-size:16px}\nimg,svg{display:block;max-width:100%}\nbutton{font:inherit;color:inherit;background:none;border:0;cursor:pointer}\na{color:inherit;text-decoration:none}\n::selection{background:var(--accent);color:#fff}\n\n/* ---------- LAYOUT HELPERS ---------- */\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--pad)}\n.section{padding:clamp(80px, 10vw, 140px) 0;position:relative}\n\n.kicker{font-family:var(--f-mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:inline-flex;align-items:center;gap:10px}\n.kicker .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}\n\n.h-display{font-family:var(--f-display);font-weight:500;line-height:.96;letter-spacing:-0.035em;color:var(--ink)}\n.h-1{font-size:clamp(54px, 9.2vw, 132px)}\n.h-2{font-size:clamp(40px, 6vw, 88px)}\n.h-3{font-size:clamp(28px, 3.6vw, 52px)}\n.text-accent{color:var(--accent)}\n.serif-it{font-style:italic;font-weight:400;letter-spacing:-.02em}\n.text-muted{color:var(--ink-2)}\n\n.lede{font-size:clamp(16px, 1.25vw, 19px);color:var(--ink-2);max-width:54ch;line-height:1.6}\n\n.section-label{display:flex;align-items:center;gap:14px;margin-bottom:40px}\n.section-label hr{flex:1;border:0;border-top:1px solid var(--line)}\n\n/* ---------- NAV ---------- */\n.nav{\n  position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:30;\n  width:min(calc(100vw - 32px), 1200px);\n  display:flex;align-items:center;justify-content:space-between;gap:24px;\n  padding:10px 14px 10px 22px;\n  background:rgba(255,255,255,.85);\n  backdrop-filter:blur(18px) saturate(140%);\n  -webkit-backdrop-filter:blur(18px) saturate(140%);\n  border:1px solid var(--line);\n  border-radius:999px;\n  box-shadow:0 8px 24px -16px rgba(0,0,0,.12);\n}\n.brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-0.01em}\n.brand .mark{width:24px;height:24px;border-radius:7px;background:var(--ink);position:relative;display:grid;place-items:center;overflow:hidden}\n.brand .mark::before{content:\"\";width:10px;height:10px;border-radius:50%;background:var(--accent)}\n.brand .mark::after{content:\"\";position:absolute;left:3px;top:3px;width:5px;height:5px;border-radius:50%;background:#fff}\n.brand b{font-size:15px}\n.nav ul{display:flex;gap:6px;list-style:none}\n.nav ul a{padding:9px 14px;border-radius:999px;font-size:14px;color:var(--ink-2);transition:background .25s ease, color .25s ease}\n.nav ul a:hover{background:var(--bg-2);color:var(--ink)}\n.nav .cta{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:999px;font-size:14px;transition:transform .25s ease, background .25s ease}\n.nav .cta:hover{background:var(--accent);transform:translateY(-1px)}\n.nav .cta svg{width:14px;height:14px}\n@media(max-width:880px){.nav ul{display:none}}\n\n/* ---------- HERO ---------- */\n.hero{padding-top:clamp(140px, 17vh, 200px);padding-bottom:clamp(40px, 5vw, 80px);position:relative;overflow:hidden}\n.hero .wrap{position:relative;z-index:1}\n\n.hero-top{display:flex;justify-content:space-between;align-items:center;gap:24px;margin-bottom:44px;flex-wrap:wrap}\n.hero-top .pill{display:inline-flex;align-items:center;gap:10px;padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:var(--card);font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-2)}\n.hero-top .pill .pulse{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 2s infinite}\n@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.6)}70%{box-shadow:0 0 0 10px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}\n.hero-top .quiet{font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}\n\n.hero h1{position:relative;z-index:2}\n.hero h1 .line{display:block;overflow:hidden}\n.hero h1 .line > i{display:inline-block;font-style:normal;transform:translateY(110%);animation:rise 1s cubic-bezier(.2,.7,.2,1) forwards}\n.hero h1 .l2 i{animation-delay:.08s}\n.hero h1 .l3 i{animation-delay:.16s}\n@keyframes rise{to{transform:translateY(0)}}\n\n.hero-foot{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:end;margin-top:56px;position:relative;z-index:2}\n.hero-foot p{opacity:0;animation:fade .8s 1.1s forwards}\n@keyframes fade{to{opacity:1}}\n.hero-ctas{display:flex;gap:12px;flex-wrap:wrap;justify-content:flex-end;align-items:center;opacity:0;animation:fade .8s 1.2s forwards}\n.hero-avail{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border:1px solid var(--line);border-radius:999px;background:var(--card);font-family:var(--f-mono);font-size:11px;letter-spacing:.08em;color:var(--ink-2);white-space:nowrap}\n.hero-avail .hpulse{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 2s infinite}\n.btn{display:inline-flex;align-items:center;gap:10px;padding:16px 22px;border-radius:999px;font-size:15px;font-weight:500;transition:transform .25s ease, background .25s ease, color .25s ease, border-color .25s ease}\n.btn svg{width:14px;height:14px;transition:transform .25s ease}\n.btn:hover svg{transform:translateX(3px)}\n.btn-primary{background:var(--ink);color:#fff;border:1px solid var(--ink)}\n.btn-primary:hover{background:var(--accent);border-color:var(--accent);transform:translateY(-2px)}\n.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}\n.btn-ghost:hover{background:var(--card);border-color:var(--ink)}\n\n@media(max-width:880px){.hero-foot{grid-template-columns:1fr}.hero-ctas{justify-content:flex-start}}\n\n/* fan of cards */\n.fan{\n  position:absolute;\n  right:-4vw;\n  top:38%;\n  width:min(620px, 56vw);\n  height:min(520px, 50vw);\n  pointer-events:none;\n  z-index:1;\n}\n.fan .vcard{\n  position:absolute;\n  width:160px;aspect-ratio:9/14;border-radius:20px;\n  box-shadow:var(--shadow-md);\n  background:#222;overflow:hidden;\n  transition:transform .6s cubic-bezier(.2,.7,.2,1);\n  border:6px solid #fff;\n}\n.fan .vcard::before{\n  content:\"\";position:absolute;inset:0;\n  background:var(--g, linear-gradient(160deg,#888,#222));\n  background-size:cover;background-position:center;\n}\n.fan .vcard::after{display:none}\n.fan .bubble{\n  position:absolute;display:inline-flex;align-items:center;gap:6px;\n  background:#fff;color:var(--ink);padding:7px 13px;border-radius:999px;\n  font-family:var(--f-mono);font-size:11px;letter-spacin rder-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2);overflow:hidden;background:var(--card);padding:22px 0}\n.marquee-track{display:flex;gap:44px;animation:scroll 44s linear infinite;white-space:nowrap;width:max-content}\n.marquee:hover .marquee-track{animation-play-state:paused}\n.marquee .item{font-family:var(--f-display);font-weight:500;font-size:clamp(22px,3vw,38px);line-height:1;letter-spacing:-0.02em;display:inline-flex;align-items:center;gap:24px;color:var(--ink)}\n.marquee .item em{font-style:italic;font-weight:400;color:var(--muted)}\n.marquee .sep{font-family:var(--f-mono);color:var(--accent);font-size:.55em}\n@keyframes scroll{to{transform:translateX(-50%)}}\n\n/* ---------- WHY ---------- */\n.why{background:var(--card);border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2)}\n.why-head{display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:end;margin-bottom:64px}\n@media(max-width:880px){.why-head{grid-template-columns:1fr}}\n\n.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}\n@media(max-width:980px){.why-grid{grid-template-columns:1fr}}\n.why-card{\n  position:relative;padding:32px;border:1px solid var(--line);border-radius:var(--radius-md);\n  background:var(--bg);transition:transform .35s ease, background .35s ease, box-shadow .35s ease;\n  display:flex;flex-direction:column;gap:14px;\n}\n.why-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}\n.why-card .ico{width:44px;height:44px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-family:var(--f-mono);font-size:13px;color:var(--accent)}\n.why-card .ico svg{width:20px;height:20px;stroke:var(--accent);fill:none}\n.why-card h3{font-family:var(--f-display);font-weight:500;font-size:24px;letter-spacing:-0.02em;line-height:1.1}\n.why-card p{color:var(--ink-2);font-size:14.5px;line-height:1.6}\n\n/* big cost comparison */\n.cost-compare{\n  display:grid;grid-template-columns:1fr auto 1fr;gap:0;\n  margin-top:48px;border:1px solid var(--line);border-radius:var(--radius-lg);overflow:hidden;\n  background:var(--bg);\n}\n.cc-side{padding:44px 40px;display:flex;flex-direction:column;gap:14px;position:relative}\n.cc-side.bad{background:var(--bg);color:var(--ink-2)}\n.cc-side.good{background:var(--ink);color:#fff}\n.cc-side .lbl{font-family:var(--f-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.7}\n.cc-side .price{font-family:var(--f-display);font-weight:500;font-size:clamp(64px,8vw,120px);line-height:.9;letter-spacing:-0.04em}\n.cc-side .price small{font-size:.4em;opacity:.55;font-weight:400}\n.cc-side.bad .price{text-decoration:line-through;text-decoration-thickness:3px;text-decoration-color:var(--accent)}\n.cc-side .price-sub{font-size:14px;opacity:.75;max-width:32ch}\n.cc-side.good .lime-tag{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;padding:4px 10px;border-radius:999px;font-family:var(--f-mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;align-self:flex-start;margin-top:6px}\n.cc-divider{\n  display:grid;place-items:center;padding:0 6px;background:var(--card);\n  font-family:var(--f-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);\n  position:relative;\n}\n.cc-divider::before, .cc-divider::after{content:\"\";position:absolute;left:50%;width:1px;background:var(--line);height:30%}\n.cc-divider::before{top:0}.cc-divider::after{bottom:0}\n.cc-divider span{rotate:-90deg;white-space:nowrap;background:var(--card);padding:6px 0}\n@media(max-width:780px){.cost-compare{grid-template-columns:1fr}.cc-divider{padding:14px 0}.cc-divider span{rotate:0}.cc-divider::before,.cc-divider::after{left:30%;right:30%;width:auto;height:1px;top:auto;bottom:auto}.cc-divider::before{top:50%}.cc-divider::after{display:none}}\n\n/* ---------- PROCESS ---------- */\n.process-head{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:end;margin-bottom:64px}\n@media(max-width:780px){.process-head{grid-template-columns:1fr}}\n\n.steps{display:grid;grid-template-columns:1fr;gap:0;border-top:1px solid var(--ink)}\n.step{\n  display:grid;\n  grid-template-columns:72px minmax(0, 1fr) minmax(0, 1.4fr);\n  grid-template-areas:\n    \"num title desc\"\n    \"num title tools\";\n  column-gap:44px;row-gap:20px;\n  padding:44px 0;border-bottom:1px solid var(--line);align-items:start;\n  position:relative;transition:padding .35s ease;\n}\n.step:hover{padding-left:18px;padding-right:18px}\n.step:hover .step-bg{opacity:1}\n.step-bg{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to right, var(--bg-2), transparent 80%);opacity:0;transition:opacity .4s ease;border-radius:14px}\n.step > *{position:relative;z-index:1}\n.step .n{grid-area:num;font-family:var(--f-mono);font-size:12px;letter-spacing:.1em;color:var(--muted);padding-top:6px}\n.step h3{grid-area:title;font-family:var(--f-display);font-weight:500;font-size:clamp(26px,3vw,40px);line-height:1;letter-spacing:-0.025em;padding-right:8px}\n.step h3 em{font-style:italic;color:var(--accent);font-weight:400}\n.step p{grid-area:desc;color:var(--ink-2);max-width:54ch;line-height:1.6;font-size:14.5px}\n.step .tools{grid-area:tools;display:flex;flex-wrap:wrap;gap:6px;align-items:center}\n.step .chip{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.06em;padding:6px 11px;border:1px solid var(--line);border-radius:999px;color:var(--ink-2);background:var(--card);white-space:nowrap;line-height:1.2;transition:transform .2s ease, background .2s ease, color .2s ease, border-color .2s ease}\n.step .chip:hover{background:var(--ink);color:#fff;border-color:var(--ink);transform:translateY(-1px)}\n.step .chip.hi{background:var(--accent-soft);border-color:#f0b5ac;color:var(--accent-deep)}\n@media(max-width:880px){\n  .step{grid-template-columns:48px 1fr;grid-template-areas:\"num title\" \"num desc\" \"num tools\";column-gap:14px;row-gap:14px;padding:30px 0}\n  .step h3{padding-right:0}\n}\n\n/* ---------- PORTFOLIO ---------- */\n.work-head{display:flex;justify-content:space-between;align-items:flex-end;gap:32px;margin-bottom:48px;flex-wrap:wrap}\n.work-filters{display:flex;gap:6px;flex-wrap:wrap}\n.filter{font-family:var(--f-mono);font-size:11px;letter-spacing:.06em;padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);transition:all .25s ease}\n.filter:hover{border-color:var(--ink);color:var(--ink)}\n.filter.is-active{background:var(--ink);color:#fff;border-color:var(--ink)}\n\n.grid-work{display:grid;grid-template-columns:repeat(12,1fr);gap:20px}\n.card{position:relative;border-radius:var(--radius-md);overflow:hidden;background:var(--card);border:1px solid var(--line-2);transition:transform .5s cubic-bezier(.2,.7,.2,1), box-shadow .5s ease}\n.card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}\n.card .frame{aspect-ratio:4/5;position:relative;overflow:hidden;display:grid;place-items:center}\n.card.v1 .frame{background:linear-gradient(160deg, #ffd6c4, #d24034)}\n.card.v2 .frame{background:linear-gradient(160deg, #d1e4ff, #1d5cff)}\n.card.v3 .frame{background:linear-gradient(160deg, #e8ffc0, #5cbe33)}\n.card.v4 .frame{background:linear-gradient(160deg, #ffe0b8, #c97a1a)}\n.card.v5 .frame{background:linear-gradient(160deg, #fbd2ff, #9237ff)}\n.card.v6 .frame{background:linear-gradient(160deg, #c4f2ff, #1d5cff)}\n.card .frame .ph{\n  position:absolute;inset:0;\n  background:repeating-linear-gradient(45deg, transparent 0 8px, rgba(255,255,255,.04) 8px 9px);\n  pointer-events:none;\n}\n.card .frame .play{\n  position:relative;z-index:2;width:62px;height:62px;border-radius:50%;\n  background:rgba(255,255,255,.16);backdrop-filter:blur(8px);\n  display:grid;place-items:center;border:1px solid rgba(255,255,255,.4);\n  transition:transform .4s ease, background .4s ease;\n}\n.card:hover .frame .play{background:#fff;transform:scale(1.08);border-color:#fff}\n.card .frame .play svg{width:20px;height:20px;fill:#fff;margin-left:3px;transition:fill .3s ease}\n.card:hover .frame .play svg{fill:var(--ink)}\n.card .frame .tag{position:absolute;top:14px;left:14px;font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);color:#fff;padding:5px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.28);z-index:2}\n.card .frame .dur{position:absolute;bottom:14px;right:14px;font-family:var(--f-mono);font-size:10px;color:#fff;letter-spacing:.06em;background:rgba(0,0,0,.45);padding:4px 8px;border-radius:6px;z-index:2}\n\n.card .meta{padding:18px 18px 22px;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:end}\n.card .meta h4{font-family:var(--f-display);font-size:21px;font-weight:500;line-height:1.15;letter-spacing:-0.02em}\n.card .meta .sub{font-family:var(--f-mono);font-size:11px;letter-spacing:.04em;color:var(--muted);margin-top:4px}\n.card .meta .kpi{text-align:right;font-family:var(--f-mono);font-size:10.5px;color:var(--ink-2);letter-spacing:.05em;text-transform:uppercase}\n.card .meta .kpi b{display:block;font-family:var(--f-display);font-size:24px;line-height:1;font-weight:500;color:var(--ink);letter-spacing:-0.02em;margin-bottom:2px}\n\n.card.span-8{grid-column:span 8}\n.card.span-7{grid-column:span 7}\n.card.span-6{grid-column:span 6}\n.card.span-5{grid-column:span 5}\n.card.span-4{grid-column:span 4}\n.card.tall .frame{aspect-ratio:3/4}\n.card.wide .frame{aspect-ratio:16/9}\n@media(max-width:980px){.grid-work{grid-template-columns:repeat(6,1fr)}.card.span-8,.card.span-7,.card.span-5,.card.span-4,.card.span-6{grid-column:span 6}}\n\n/* ---------- PRICING ---------- */\n.pricing{background:var(--card);border-top:1px solid var(--line-2);border-bottom:1px solid var(--line-2)}\n.pricing-head{display:grid;grid-template-columns:1.1fr 1fr;gap:48px;align-items:end;margin-bottom:64px}\n@media(max-width:780px){.pricing-head{grid-template-columns cer fee per video.<\u002Fp>\n      <div class=\"hero-ctas\">\n        <a href=\"#pricing\" class=\"btn btn-primary\">See pricing <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M13 5l7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fa>\n        <a href=\"#work\" class=\"btn btn-ghost\">View the work<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- MARQUEE -->\n<section class=\"marquee\" aria-hidden=\"true\">\n  <div class=\"marquee-track\">\n    <span class=\"item\">Seedance <em>2.0<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Kling <em>3.0<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Nano-Banana <em>2<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Runway <em>Gen-4<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Veo <em>3<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Pika <em>2<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">ElevenLabs <em>v3<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Higgsfield<\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Seedance <em>2.0<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Kling <em>3.0<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Nano-Banana <em>2<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Runway <em>Gen-4<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Veo <em>3<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Pika <em>2<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">ElevenLabs <em>v3<\u002Fem><\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n    <span class=\"item\">Higgsfield<\u002Fspan><span class=\"item sep\">✺<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY AI -->\n<section class=\"section why\" id=\"why\" data-screen-label=\"02 Why AI\">\n  <div class=\"wrap\">\n\n    <div class=\"section-label reveal\"><span class=\"kicker\"><span class=\"dot\"><\u002Fspan>Why AI UGC<\u002Fspan><hr><\u002Fdiv>\n\n    <div class=\"why-head\">\n      <h2 class=\"h-display h-2 reveal\">\n        Same scroll-stop.<br>\n        <span class=\"text-accent\">A fraction<\u002Fspan> of the budget.\n      <\u002Fh2>\n      <p class=\"lede reveal d1\">\n        A single influencer can charge <b>$3,000+ for one video<\u002Fb> — and you're\n        locked into <em>their<\u002Fem> face, <em>their<\u002Fem> aesthetic, and\n        <em>their<\u002Fem> calendar. AI UGC flips the equation: you keep the budget,\n        the creative control, and the ability to test a brand-true look across\n        dozens of hooks until the algorithm picks a winner.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <!-- big cost compare -->\n    <div class=\"cost-compare reveal d2\">\n      <div class=\"cc-side bad\">\n        <span class=\"lbl\">Traditional influencer route<\u002Fspan>\n        <span class=\"price\">$3,000<small>/video<\u002Fsmall><\u002Fspan>\n        <span class=\"price-sub\">One creator, one face, one shoot day. Want a second hook? Pay again. Want a different angle? Pay again.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"cc-divider\"><span>vs.<\u002Fspan><\u002Fdiv>\n      <div class=\"cc-side good\">\n        <span class=\"lbl\">Frame Zero · AI UGC<\u002Fspan>\n        <span class=\"price\">from&nbsp;$140<small>/video<\u002Fsmall><\u002Fspan>\n        <span class=\"price-sub\">Custom creators, your brand DNA, every hook and angle you want — at the cost of a coffee meeting with an influencer agent.<\u002Fspan>\n        <span class=\"lime-tag\">≈ 95% cheaper · 100% on-brand<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- three pillars -->\n    <div class=\"why-grid\" style=\"margin-top:60px\">\n      <article class=\"why-card reveal\">\n        <div class=\"ico\" data-comment-anchor=\"f1a71a89c0-div\"><svg viewBox=\"0 0 24 24\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12V4h8l9 9-8 8-9-9z\"><\u002Fpath><circle cx=\"7.5\" cy=\"7.5\" r=\"1.3\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h3>Cheaper by an order of magnitude.<\u002Fh3>\n        <p>A creator-style ad for the cost of a takeaway dinner. You can finally <b>test 10 hooks for the price of one shoot<\u002Fb>, instead of betting the whole budget on a single influencer who might not convert.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"why-card reveal d1\">\n        <div class=\"ico\"><svg viewBox=\"0 0 24 24\" stroke-width=\"1.4\" stroke-linecap=\"round\"><path d=\"M5 12a7 7 0 0 1 14 0v3\"><\u002Fpath><path d=\"M8 12a4 4 0 0 1 8 0v5\"><\u002Fpath><path d=\"M11 12a1 1 0 0 1 2 0v8\"><\u002Fpath><path d=\"M5 16v1\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>A look that's actually yours.<\u002Fh3>\n        <p>You're not borrowing somebody else's vibe. We build a <b>brand DNA<\u002Fb> — characters, palette, lighting, props, tone — and every spot inherits it, so your ads finally feel like one universe instead of seven random faces.<\u002Fp>\n      <\u002Farticle>\n      <article class=\"why-card reveal d2\">\n        <div class=\"ico\" data-comment-anchor=\"ffd12730c3-div\"><svg viewBox=\"0 0 24 24\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 8h13\"><\u002Fpath><path d=\"M14 5l3 3-3 3\"><\u002Fpath><path d=\"M20 16H7\"><\u002Fpath><path d=\"M10 19l-3-3 3-3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3>Endless angles, endless tests.<\u002Fh3>\n        <p>Need the same script with a different hook? Same set, new ending? Same character, different mood? With AI it's a prompt tweak, not a re-shoot. The result: <b>more shots on goal<\u002Fb> for every dollar in.<\u002Fp>\n      <\u002Farticle>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROCESS -->\n<section class=\"section\" id=\"process\" data-screen-label=\"03 Process\">\n  <div class=\"wrap\">\n\n    <div class=\"section-label reveal\"><span class=\"kicker\"><span class=\"dot\"><\u002Fspan>Process &amp; Stack<\u002Fspan><hr><\u002Fdiv>\n\n    <div class=\"process-head\">\n      <h2 class=\"h-display h-2 reveal\">\n        Research <em class=\"text-accent serif-it\">first<\u002Fem>.<br>\n        Models <em class=\"text-accent serif-it\">last<\u002Fem>.\n      <\u002Fh2>\n      <p class=\"lede reveal d1\">\n        Most AI video looks generated because it <em>was<\u002Fem> — straight from\n        prompt to render with nothing in between. I spend the front half of every\n        project on deep ad research, so the back half feels like a real human\n        sat down and shot it.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n\n      <article class=\"step reveal\">\n        <div class=\"step-bg\"><\u002Fdiv>\n        <div class=\"n\">/ 01<\u002Fdiv>\n        <h3>Deep ad <em>research<\u002Fem>.<\u002Fh3>\n        <p>Before a single frame gets generated, I pull weeks of live, paid-spend ads from your niche through dedicated competitor-intel tools. Hooks, formats, durations, edit cadence — what's actually being scaled, not what looks pretty on Pinterest.<\u002Fp>\n        <div class=\"tools\">\n          <span class=\"chip hi\" data-comment-anchor=\"78fe54fc35-span\">Foreplay<\u002Fspan>\n          <span class=\"chip\">Atria<\u002Fspan>\n          <span class=\"chip\">Pipiads<\u002Fspan>\n          <span class=\"chip\">Minea<\u002Fspan>\n          <span class=\"chip\">Meta Ad Library<\u002Fspan>\n          <span class=\"chip\">TikTok Creative Center<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <article class=\"step reveal\">\n        <div class=\"step-bg\"><\u00 px)\">\n      Let's ship the next<br>\n      batch of <span class=\"stamp\">ads<\u002Fspan><br>\n      that actually <em>convert<\u002Fem>.\n    <\u002Fh2>\n\n    <div class=\"c-grid\">\n      <div class=\"c-info reveal\">\n        <dl>\n          <dt>Email<\u002Fdt><dd><a href=\"mailto:hello@framezero.studio\">shurpik.y@gmail.com<\u002Fa><\u002Fdd>\n          <dt>Location<\u002Fdt><dd>Warsaw / Worldwide remote<\u002Fdd>\n          <dt>Response<\u002Fdt><dd>Usually within 3 working hours.<\u002Fdd>\n        <\u002Fdl>\n        <div class=\"c-availability\">\n          <span class=\"pulse2\"><\u002Fspan>\n          <span>Currently booking — 2 free slots<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <form class=\"form reveal d1\" id=\"contactForm\" action=\"https://api.web3forms.com/submit\" method=\"POST\">\n        <input type=\"hidden\" name=\"access_key\" value=\"31a1cd0c-af59-449d-8762-7add14f69e99\">\n        <input type=\"hidden\" name=\"subject\" value=\"New brief from framezero.studio\">\n        <input type=\"hidden\" name=\"from_name\" value=\"Frame Zero website\">\n        <input type=\"checkbox\" name=\"botcheck\" style=\"display:none\">\n\n        <div class=\"row\">\n          <div class=\"field\"><input type=\"text\" id=\"n\" name=\"name\" placeholder=\" \" required=\"\"><label for=\"n\">Your name<\u002Flabel><\u002Fdiv>\n          <div class=\"field\"><input type=\"text\" id=\"c\" name=\"company\" placeholder=\" \"><label for=\"c\">Company<\u002Flabel><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div class=\"field\"><input type=\"email\" id=\"e\" name=\"email\" placeholder=\" \" required=\"\"><label for=\"e\">Email<\u002Flabel><\u002Fdiv>\n          <div class=\"field\">\n            <select id=\"s\" name=\"scope\" required=\"\">\n              <option value=\"\" disabled=\"\" selected=\"\"><\u002Foption>\n              <option>One-off ad ($140 / $160)<\u002Foption>\n              <option>5-pack of hooks &amp; CTAs<\u002Foption>\n              <option>Full campaign launch<\u002Foption>\n              <option>Just exploring — let's chat<\u002Foption>\n            <\u002Fselect>\n            <label for=\"s\">Scope<\u002Flabel>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"field\"><textarea id=\"m\" name=\"message\" placeholder=\" \" required=\"\"><\u002Ftextarea><label for=\"m\">Tell me about the brand &amp; the goal<\u002Flabel><\u002Fdiv>\n\n        <button class=\"submit\" type=\"submit\">\n          Send the brief\n          <svg width=\"18\" height=\"12\" viewBox=\"0 0 18 12\" fill=\"none\"><path d=\"M1 6h16m0 0l-5-5m5 5l-5 5\" stroke=\"currentColor\" stroke-width=\"1.6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fform>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer class=\"foot\">\n  <div class=\"col\"><span class=\"brand\" style=\"color:rgba(255,255,255,.85)\"><span class=\"mark\"><\u002Fspan><b>FRAMEGEN STUDIO<\u002Fb><\u002Fspan> <span>© 2026<\u002Fspan><\u002Fdiv>\n  <div class=\"col colo\">\n    <a href=\"#\">Instagram<\u002Fa><a href=\"#\">LinkedIn<\u002Fa><a href=\"#\">TikTok<\u002Fa><a href=\"#\">YouTube<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"col\"><span>Built by hand · Powered by machines.<\u002Fspan><\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* reveal */\n(function(){\n  const io = new IntersectionObserver(es=>{\n    es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target) }});\n  },{rootMargin:'-6% 0px -8% 0px', threshold:.05});\n  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n})();\n\n/* portfolio filter */\n(function(){\n  const filters = document.querySelectorAll('#filters .filter');\n  const cards = document.querySelectorAll('#grid .card');\n  filters.forEach(b=>b.addEventListener('click', ()=>{\n    filters.forEach(x=>x.classList.remove('is-active'));\n    b.classList.add('is-active');\n    const f = b.dataset.f;\n    cards.forEach(c=>{\n      const show = f==='all' || c.dataset.cat===f;\n      c.style.transition='opacity .35s ease, transform .45s ease';\n      c.style.opacity = show ? '1' : '0';\n      c.style.transform = show ? '' : 'scale(.98)';\n      c.style.pointerEvents = show ? '' : 'none';\n      setTimeout(()=>{ c.style.display = show ? '' : 'none'; }, show?0:300);\n    });\n  }));\n})();\n\n/* budget toggle */\n(function(){\n  document.querySelectorAll('#budget .budget-opt').forEach(b=>b.addEventListener('click', ()=>{\n    document.querySelectorAll('#budget .budget-opt').forEach(x=>x.classList.remove('is-on'));\n    b.classList.add('is-on');\n  }));\n})();\n\n/* select label float */\n(function(){\n  document.querySelectorAll('select').forEach(s=>{\n    const sync=()=> s.classList.toggle('has-val', !!s.value);\n    s.addEventListener('change', sync); sync();\n  });\n})();\n\n/* form submit — Web3Forms AJAX (keeps user on page, shows thank-you state) */\n(function(){\n  const f = document.getElementById('contactForm');\n  if(!f) return;\n  f.addEventListener('submit', async e=>{\n    e.preventDefault();\n    const btn = f.querySelector('.submit');\n    const original = btn.innerHTML;\n    btn.disabled = true;\n    btn.innerHTML = 'Sending\\u2026';\n    try{\n      const data = new FormData(f);\n      const res = await fetch('https://api.web3forms.com/submit', {\n        method:'POST',\n        body:data,\n        headers:{ 'Accept':'application/json' }\n      });\n      const json = await res.json();\n      if(json.success){\n        f.innerHTML = '<div style=\"padding:48px 0;text-align:center;font-family:var(--f-display);font-size:32px;font-weight:500;letter-spacing:-.02em\">Thanks — I\\'ll reply within the day.<\u002Fdiv>';\n      } else {\n        throw new Error(json.message || 'Submission failed');\n      }\n    } catch(err){\n      btn.disabled = false;\n      btn.innerHTML = original;\n      alert('Sorry — something went wrong sending the form. Please email hello@framezero.studio directly.');\n      console.error(err);\n    }\n  });\n})();\n\n/* fan parallax on mouse */\n(function(){\n  const fan = document.querySelector('.fan');\n  if(!fan) return;\n  const cards = fan.querySelectorAll('.vcard');\n  document.querySelector('.hero').addEventListener('mousemove', e=>{\n    const r = fan.getBoundingClientRect();\n    const x = (e.clientX - r.left - r.width/2) / r.width;\n    const y = (e.clientY - r.top - r.height/2) / r.height;\n    cards.forEach((c,i)=>{\n      const k = (i-2.5)*2;\n      c.style.translate = `${x*k*1.2}px ${y*k*0.8}px`;\n    });\n  });\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
